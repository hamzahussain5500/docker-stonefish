services:
  ros2-jazzy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - rosversion=${rosversion}

    image: ros2-jazzy-desktop:latest
    container_name: ${container_name}
    hostname: ${hostname}
    network_mode: host

    environment:
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: ${QT_X11_NO_MITSHM}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: graphics,utility,compute
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./files:/root/sim_files:ro
      - /dev/input:/dev/input

    # Allow access to all input devices (joystick js*, event*)
    # Major device number 13 covers all /dev/input/* character devices
    device_cgroup_rules:
      - 'c 13:* rmw'

    # Add the host 'input' group so the container can read joystick devices
    group_add:
      - "107"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    stdin_open: true
    tty: true
    restart: unless-stopped

    